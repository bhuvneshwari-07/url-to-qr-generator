<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Generate QR Code</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .container { max-width: 500px; margin-top: 80px; }
    .card { border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card p-4">
      <h3 class="text-center mb-3 text-primary">🔗 Generate QR Code</h3>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" name="name" class="form-control" placeholder="Enter a name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">URL</label>
          <input type="url" name="url" class="form-control" placeholder="Enter the URL" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">Generate QR</button>
        </div>
      </form>
      <div class="text-center mt-3">
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm">View Dashboard</a>
      </div>
    </div>
  </div>
</body>
</html>
