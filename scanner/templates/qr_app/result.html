<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code Generated</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { 
  background: linear-gradient(135deg,#FFE6CC,#FFB3CC); 
  font-family:'Nunito', sans-serif; 
}
.card { 
  background:white; border-radius:20px; padding:40px; margin-top:100px; text-align:center; 
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}
.qr-img { width:250px; height:250px; margin:auto; display:block; }
h3 { color:#ff3399; font-weight:700; margin-bottom:20px;}
.btn-download { margin-top:15px; background:#ff66cc; color:white; font-weight:600;}
</style>
</head>
<body>
<div class="container col-md-5">
<div class="card">
<h3>✅ QR Code Generated!</h3>
<img src="{{ qr.qr_image.url }}" class="qr-img" alt="QR Image">
<h5 class="mt-3">{{ qr.name }}</h5>
<p><a href="{{ qr.url }}" target="_blank">{{ qr.url }}</a></p>

<a href="{{ qr.qr_image.url }}" download="{{ qr.name }}.png" class="btn btn-download w-100">⬇ Download QR</a>
<a href="{% url 'input_page' %}" class="btn btn-primary w-100 mt-3">Generate Another</a>
<a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100 mt-2">Go to Dashboard</a>
</div>
</div>
</body>
</html>
