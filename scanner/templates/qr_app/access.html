<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Enter Password</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { 
    background: linear-gradient(135deg,#f9f9f9,#d3e0ea); 
    font-family:'Poppins',sans-serif;
}
.container { margin-top:100px; max-width:400px; }
.card { padding:30px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
</style>
</head>
<body>
<div class="container card">
<h4 class="mb-3">Enter password to access "{{ qr.name }}"</h4>
{% if messages %}{% for m in messages %}
<div class="alert alert-danger">{{ m }}</div>{% endfor %}{% endif %}

<form method="POST">{% csrf_token %}
<input type="text" class="form-control mb-2" name="password" placeholder="Password">
{% if qr.hint %}<small class="text-muted">Hint: {{ qr.hint }}</small>{% endif %}
<button class="btn btn-primary w-100 mt-3">Submit</button>
</form>
</div>
</body>
</html>
