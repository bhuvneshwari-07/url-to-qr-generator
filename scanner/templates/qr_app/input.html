<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate QR Code</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: linear-gradient(135deg,#74ebd5,#ACB6E5); font-family: 'Poppins', sans-serif; }
.form-container { background: white; border-radius: 15px; padding: 40px; margin-top: 80px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
h2 { font-weight:600;color:#333; }
</style>
</head>
<body>
<div class="container col-md-5 form-container">
<h2 class="text-center mb-4">🧾 Generate Your QR Code</h2>
{% if messages %}{% for message in messages %}
<div class="alert alert-danger">{{ message }}</div>{% endfor %}{% endif %}
<form method="POST">{% csrf_token %}
<div class="mb-3"><label class="form-label">Name of URL</label>
<input type="text" class="form-control" name="name" placeholder="Enter name for QR"></div>
<div class="mb-3"><label class="form-label">Enter URL</label>
<input type="url" class="form-control" name="url" placeholder="https://example.com"></div>
<button class="btn btn-primary w-100">Generate QR</button>
</form>
<div class="text-center mt-3"><a href="{% url 'dashboard' %}" class="text-dark">📊 View Dashboard</a></div>
</div>
</body>
</html>
